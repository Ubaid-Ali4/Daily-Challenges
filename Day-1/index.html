<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-1</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>



    <div class="clock-background">
        <span id="clock"></span>
    </div>
    <div class="search">
        <input type="search" placeholder="Search here...">
        <button type="submit">Search</button>
    </div>
    <div class="apps-grid">
        <div class="app-item">
            <div class="app-icon"><img src="res/teachmint.jpeg" alt="teachmint"></div>
            <span>Teachmint</span>
        </div>
        <div class="app-item">
            <div class="app-icon"><img src="res/screenshare.png" alt="screenshare"></div>
            <span>Screen Share</span>
        </div>
        <div class="app-item">
            <div class="app-icon"><img src="res/google.webp" alt=""></div>
            <span>Google</span>
        </div>
        <div class="app-item">
            <div class="app-icon"><img src="res/meet.jpeg" alt=""></div>
            <span>Meet</span>
        </div>
        <div class="app-item">
            <div class="app-icon"><img src="res/playstore.png" alt=""></div>
            <span>Play Store</span>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
